# Prometheus scrape configuration for TIDAL

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerting_rules.yml"

scrape_configs:
  - job_name: "tidal-api"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["tidal-api:8000"]
        labels:
          service: "tidal"
          environment: "production"

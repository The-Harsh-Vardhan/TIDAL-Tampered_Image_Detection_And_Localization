name: Deploy to HF Spaces

on:
  push:
    branches: [production]
    paths:
      - "backend/**"
      - "models/inference/vR.P.30.1/**"
      - "requirements-prod.txt"
      - "deploy/hf-spaces/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build HF Space directory
        run: |
          mkdir -p hf_space/backend hf_space/models
          cp deploy/hf-spaces/Dockerfile hf_space/
          cp deploy/hf-spaces/README.md hf_space/
          cp requirements-prod.txt hf_space/
          cp -r backend/* hf_space/backend/
          cp models/inference/vR.P.30.1/best_model.pt hf_space/models/
          cp models/inference/vR.P.30.1/manifest.json hf_space/models/

      - name: Install HF CLI
        run: python -m pip install --upgrade "huggingface_hub[cli]"

      - name: Push to HF Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
        run: |
          hf upload ${HF_USERNAME}/tidal-api hf_space . \
            --repo-type space \
            --token "${HF_TOKEN}" \
            --delete "*" \
            --commit-message "auto-deploy: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

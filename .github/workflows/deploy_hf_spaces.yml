name: Deploy to HF Spaces

on:
  push:
    branches: [production]
    paths:
      - "backend/**"
      - "models/inference/vR.P.30.1/**"
      - "requirements-prod.txt"
      - "deploy/hf-spaces/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build HF Space directory
        run: |
          mkdir -p hf_space/backend hf_space/models
          cp deploy/hf-spaces/Dockerfile hf_space/
          cp deploy/hf-spaces/README.md hf_space/
          cp requirements-prod.txt hf_space/
          cp -r backend/* hf_space/backend/
          cp -r models/inference/vR.P.30.1/* hf_space/models/

      - name: Push to HF Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
        run: |
          cd hf_space
          git init
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git remote add space https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/tidal-api
          git add -A
          git commit -m "auto-deploy: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push space main --force

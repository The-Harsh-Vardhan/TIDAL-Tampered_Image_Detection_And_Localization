name: Docker Build
on:
  push: {branches: [main, production], paths: [backend/**, docker/**, requirements-prod.txt]}
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with: {context: ., file: docker/Dockerfile, push: false, tags: "tidal:latest"}

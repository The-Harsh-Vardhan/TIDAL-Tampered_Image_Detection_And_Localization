# W&B Sweep — Image Tampering Detection Ablation Study
# Grid sweep: one run per planned experiment (not hyperparameter optimization)
# Each experiment_id maps to a pre-converted .py module from the corresponding notebook.
#
# Usage:
#   python convert_notebooks.py        # one-time: generate modules/
#   wandb sweep sweep.yaml             # create sweep
#   wandb agent <SWEEP_ID>             # run all experiments sequentially

program: sweep_runner.py
method: grid
project: tamper-detection-ablation

metric:
  name: pixel_f1
  goal: maximize

parameters:
  experiment_id:
    values:
      - "P.0"
      - "P.1"
      - "P.1.5"
      - "P.2"
      - "P.3"
      - "P.4"
      - "P.5"
      - "P.6"
      - "P.7"
      - "P.8"
      - "P.9"
      - "P.10"
      - "P.11"
      - "P.12"
      - "P.13"
      - "P.14"
      - "P.15"
      - "P.16"
      - "P.17"
      - "P.18"
      - "P.19"
      - "P.20"
      - "P.21"
      - "P.22"
      - "P.23"
      - "P.24"
      - "P.25"
      - "P.26"
      - "P.27"
      - "P.28"

command:
  - ${env}
  - python
  - ${program}
  - ${args}
